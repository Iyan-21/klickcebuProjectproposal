{% extends 'app_base.html' %}
{% block title %}Confirm Delete - KlickCebu{% endblock %}
{% block content %}
<div class="content-wrap">
    <div class="form-card">
        <h2 style="margin-bottom:10px;">Delete "{{ object }}"?</h2>
        <p style="color:var(--muted); margin-bottom:20px;">This action can't be undone.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn-kc-sm danger" style="padding:10px 22px; font-size:14px;">Yes, Delete</button>
                <a href="{% url back_url %}" class="btn-kc-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
