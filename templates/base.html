{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}KlickCebu{% endblock %}</title>
<link rel="icon" href="{% static 'img/favicon.ico' %}" sizes="any">
<link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
<link rel="apple-touch-icon" href="{% static 'img/favicon.png' %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body>
<div class="site-ambient" aria-hidden="true"><span></span><span></span><span></span></div>
<div class="site-content">
{% block navbar %}
<nav class="navbar-kc">
    <a href="{% url 'pages:landing' %}" class="brand">klick.cebu<span class="brand-sub">CAMERA RENTAL</span></a>
    <div class="nav-links">
        <a href="{% url 'rentals:equipment_list' %}">Equipment</a>
        <a href="{% url 'pages:availability' %}">Availability</a>
        {% if request.user.is_authenticated %}
            <a href="{% url 'dashboard:home' %}">Dashboard</a>
            <a href="{% url 'accounts:logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'accounts:login' %}">Login</a>
            <a href="{% url 'accounts:register' %}" class="btn-kc-sm">Register</a>
        {% endif %}
    </div>
</nav>
{% endblock %}
{% block content %}{% endblock %}
</div>
</body>
</html>
